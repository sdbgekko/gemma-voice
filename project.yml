name: GemmaVoice
options:
  bundleIdPrefix: com.shermanbrown
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: JKCNSW94H7
    CODE_SIGN_STYLE: Automatic
targets:
  GemmaVoiceWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchSources
      - path: WatchResources/Assets.xcassets
        buildPhase: resources
    info:
      path: WatchResources/Info.plist
      properties:
        CFBundleDisplayName: GemmaVoice
        CFBundleShortVersionString: "0.2.8"
        CFBundleVersion: "11"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.shermanbrown.gemmavoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shermanbrown.gemmavoice.watchkitapp
        DEVELOPMENT_TEAM: JKCNSW94H7
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: WatchResources/Info.plist
        SUPPORTS_MACCATALYST: "NO"
  GemmaVoice:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: GemmaVoice
        CFBundleShortVersionString: "0.2.8"
        CFBundleVersion: "11"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "GemmaVoice needs the microphone to hear you."
        NSSpeechRecognitionUsageDescription: "GemmaVoice uses on-device speech recognition as a fallback when the server transcription is unreachable."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shermanbrown.gemmavoice
        DEVELOPMENT_TEAM: JKCNSW94H7
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Resources/Info.plist
    dependencies:
      - target: GemmaVoiceWatch
        embed: true
        codeSign: true
